<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lectura Biblia</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="topbar">
  <h1>📖 Modo Lectura</h1>
  <button onclick="window.location.href='index.html'">
    ⬅ Volver
  </button>
</header>

<section class="card">
  <h2 id="bookTitle">Libro</h2>

  <select id="chapterSelect"></select>

  <button onclick="loadChapter()">Leer capítulo</button>

  
<div id="readingBox" class="text-box"></div>

<h3>⭐ Favoritos</h3>
<div id="favoritesBox" class="text-box"></div>
</section>

<script type="module">
import { obtenerCapitulo, guardarFavorito, obtenerFavoritos } from "./bible.js";

let currentChapter = 1;

const chapterSelect = document.getElementById("chapterSelect");
const readingBox = document.getElementById("readingBox");

/* capítulos */
for (let i = 1; i <= 50; i++) {
  let opt = document.createElement("option");
  opt.value = i;
  opt.innerText = "Capítulo " + i;
  chapterSelect.appendChild(opt);
}

/* =========================
   📖 CARGAR CAPÍTULO
========================= */
window.loadChapter = async function () {
  currentChapter = chapterSelect.value;

  const data = await obtenerCapitulo("genesis", currentChapter);

  readingBox.innerHTML = "";

  data.versiculos.forEach((v, index) => {
    let p = document.createElement("p");
    p.innerText = v;

    // ⭐ click para guardar favorito
    p.onclick = () => {
      guardarFavorito(v);
      loadFavorites();
      alert("Versículo guardado ⭐");
    };

    readingBox.appendChild(p);
  });

  localStorage.setItem("lastChapter", currentChapter);
};

/* =========================
   ⭐ CARGAR FAVORITOS
========================= */
function loadFavorites() {
  const box = document.getElementById("favoritesBox");
  const favs = obtenerFavoritos();

  box.innerHTML = favs.length
    ? favs.map(f => `⭐ ${f.texto}`).join("<br><br>")
    : "No tienes favoritos aún";
}

loadFavorites();

/* navegación */
window.prevChapter = function () {
  if (currentChapter > 1) {
    currentChapter--;
    chapterSelect.value = currentChapter;
    loadChapter();
  }
};

window.nextChapter = function () {
  currentChapter++;
  chapterSelect.value = currentChapter;
  loadChapter();
};
</script>

</body>
</html>
